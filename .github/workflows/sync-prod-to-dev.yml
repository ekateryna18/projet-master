name: Sync Prod to Dev

on:
  workflow_run:
    workflows: ["CI/CD TP2 Pipeline"]
    branches: [main]
    types: [completed]
  repository_dispatch:
    types: [sync-prod-to-dev]

jobs:
  sync:
    runs-on: ubuntu-latest
    # Only run if the CI/CD pipeline succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'repository_dispatch' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}  

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge main into develop
        run: |
          git fetch origin main:refs/remotes/origin/main
          git fetch origin develop:refs/remotes/origin/develop
          git checkout develop
          if git merge --no-edit origin/main; then
            git push origin develop
            echo "Main successfully merged into develop"
          else
            git merge --abort
            echo "Merge conflict detected — create a PR manually"
            exit 1
          fi